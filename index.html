<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fatality 614 Beta Countdown</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow bg-glow-left"></div>
  <div class="bg-glow bg-glow-right"></div>
  <div class="bg-vignette"></div>

  <main class="page-wrap">
    <section class="hero">
      <header class="logo-wrap">
        <h1 class="logo-title">FATALITY</h1>
        <div class="logo-swoosh" aria-hidden="true"></div>
        <div class="logo-sub">614</div>
        <p class="hero-subtitle">BETA COUNTDOWN</p>
      </header>

      <section class="countdown-shell" aria-label="Countdown to beta launch">
        <div class="ornament ornament-top" aria-hidden="true">✦</div>

        <div class="panel-label">LAUNCHING BETA IN</div>

        <div class="countdown-grid">
          <article class="time-box">
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>
            <div class="time-inner">
              <div class="time-value" id="days">00</div>
              <div class="time-unit">DAYS</div>
            </div>
          </article>

          <article class="time-box">
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>
            <div class="time-inner">
              <div class="time-value" id="hours">00</div>
              <div class="time-unit">HOURS</div>
            </div>
          </article>

          <article class="time-box">
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>
            <div class="time-inner">
              <div class="time-value" id="minutes">00</div>
              <div class="time-unit">MINUTES</div>
            </div>
          </article>

          <article class="time-box">
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>
            <div class="time-inner">
              <div class="time-value" id="seconds">00</div>
              <div class="time-unit">SECONDS</div>
            </div>
          </article>
        </div>

        <div class="launch-date">
          FRIDAY <span>·</span> MAY 1, 2026
        </div>

        <div class="ornament ornament-bottom" aria-hidden="true">✦</div>
      </section>

      <nav class="footer-links" aria-label="External links">
        <a href="https://discord.gg/fatality614" target="_blank" rel="noopener noreferrer">DISCORD</a>
        <a href="https://forum.fatalityrsps.com/" target="_blank" rel="noopener noreferrer">FORUMS</a>
        <a href="https://fatalityrsps.com/" target="_blank" rel="noopener noreferrer">MAIN SITE</a>
      </nav>

      <noscript>
        <p class="noscript-message">
          JavaScript is required to display the live countdown.
        </p>
      </noscript>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
